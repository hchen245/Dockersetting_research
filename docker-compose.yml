services:
  # Frontend service - React application
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: dom-frontend
    ports:
      - "8080:3000"
    depends_on:
      - backend
    networks:
      - app-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s

  # Backend service - Node.js with vulnerabilities
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: dom-backend
    ports:
      - "8000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
    networks:
      - app-network
    volumes:
      - ./data:/app/data:ro
    # Security restrictions for vulnerability research
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    cap_add:
      - NET_BIND_SERVICE
    mem_limit: 512m
    cpus: 0.5
    pids_limit: 100
    read_only: true
    tmpfs:
      - /tmp
      - /run

  # Security scanner service for vulnerability analysis
  scanner:
    build:
      context: .
      dockerfile: Dockerfile.scanner
    container_name: dom-scanner
    volumes:
      - ./src:/code:ro
      - ./scan-results:/scan/results
    environment:
      - SCAN_MODE=full
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    mem_limit: 256m
    cpus: 0.25
    read_only: true
    tmpfs:
      - /tmp
      - /home/scanner
      - /root

networks:
  app-network:
    driver: bridge
